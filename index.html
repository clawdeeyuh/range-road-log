<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Range Road Incident Log</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f0;
      --surface: #ffffff;
      --border: #e2e2dd;
      --text: #1a1a1a;
      --muted: #6b7280;
      --header-bg: #1e293b;
      --accent: #3b82f6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--header-bg);
      color: #f8fafc;
      padding: 2rem 1.25rem 1.5rem;
    }
    .header-inner { max-width: 900px; margin: 0 auto; }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.2rem;
    }
    .header .subtitle {
      font-size: 0.875rem;
      color: #94a3b8;
      margin-bottom: 1.5rem;
    }

    .stats { display: flex; gap: 1rem; flex-wrap: wrap; }
    .stat-card {
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      min-width: 110px;
    }
    .stat-value { font-size: 1.75rem; font-weight: 700; line-height: 1; }
    .stat-label { font-size: 0.75rem; color: #94a3b8; margin-top: 0.25rem; }

    .type-stats { margin-top: 1rem; display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .type-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.75rem;
      background: rgba(255,255,255,0.1);
      border-radius: 100px;
      padding: 0.25rem 0.625rem;
      color: #e2e8f0;
    }
    .type-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── Filter bar ── */
    .filter-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.25rem;
      position: sticky;
      top: 0;
      z-index: 100;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      gap: 0.5rem;
      white-space: nowrap;
    }
    .filter-btn {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 100px;
      padding: 0.375rem 0.875rem;
      font-size: 0.8125rem;
      cursor: pointer;
      font-family: inherit;
      color: var(--muted);
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: #94a3b8; color: var(--text); }
    .filter-btn.active { background: var(--text); border-color: var(--text); color: #fff; }

    /* ── Main ── */
    .main { max-width: 900px; margin: 0 auto; padding: 1.25rem; }

    .result-label {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .cards {
      display: grid;
      gap: 1rem;
      grid-template-columns: 1fr;
    }
    @media (min-width: 600px) {
      .cards { grid-template-columns: repeat(2, 1fr); }
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.125rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .type-tag {
      display: inline-block;
      padding: 0.25rem 0.625rem;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .card-date { font-size: 0.75rem; color: var(--muted); text-align: right; white-space: nowrap; }

    .card-location {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .card-location svg { flex-shrink: 0; color: var(--muted); }

    .card-description { font-size: 0.875rem; color: #374151; line-height: 1.6; }

    .card-photos { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .photo-thumb {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: opacity 0.15s;
    }
    .photo-thumb:hover { opacity: 0.8; }

    .card-video a {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.8125rem;
      color: var(--accent);
      text-decoration: none;
    }
    .card-video a:hover { text-decoration: underline; }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-top: 1px solid var(--border);
      padding-top: 0.75rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6875rem;
      font-weight: 600;
      color: #64748b;
      flex-shrink: 0;
    }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 8px;
      object-fit: contain;
    }
    .lightbox-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 1.125rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── States ── */
    .state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .state.error { color: #ef4444; }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .no-results { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.875rem; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <h1>Range Road Incident Log</h1>
    <p class="subtitle">Community-submitted incident reports</p>
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-label">Total incidents</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-month">—</div>
        <div class="stat-label">This month</div>
      </div>
    </div>
    <div class="type-stats" id="type-stats"></div>
  </div>
</header>

<div class="filter-bar" id="filter-bar" style="display:none">
  <div class="filter-inner" id="filter-inner"></div>
</div>

<main class="main">
  <div class="result-label" id="result-label" style="display:none"></div>
  <div class="state" id="loading">
    <div class="spinner"></div>
    Loading incidents…
  </div>
  <div class="state error" id="error" style="display:none"></div>
  <div class="cards" id="cards"></div>
</main>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <button class="lightbox-close" id="lightbox-close" aria-label="Close">✕</button>
  <img id="lightbox-img" src="" alt="Enlarged incident photo">
</div>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/11Hey4pC7S4sOshp9LkmxcPbBGzNqbn3fh75LgoUUm9Q/gviz/tq?tqx=out:json&sheet=Form%20Responses%201';

// Colour palette – assigned in alphabetical type order for consistency
const PALETTE = [
  { bg: '#fef3c7', text: '#92400e', dot: '#f59e0b' },
  { bg: '#fee2e2', text: '#991b1b', dot: '#ef4444' },
  { bg: '#dbeafe', text: '#1e40af', dot: '#3b82f6' },
  { bg: '#dcfce7', text: '#166534', dot: '#22c55e' },
  { bg: '#f3e8ff', text: '#6b21a8', dot: '#a855f7' },
  { bg: '#ffedd5', text: '#9a3412', dot: '#f97316' },
  { bg: '#cffafe', text: '#155e75', dot: '#06b6d4' },
  { bg: '#fce7f3', text: '#9d174d', dot: '#ec4899' },
];
const colorMap = {};
let colorIdx = 0;
function typeColor(t) {
  if (!colorMap[t]) colorMap[t] = PALETTE[colorIdx++ % PALETTE.length];
  return colorMap[t];
}

// ── Utilities ─────────────────────────────────────────────

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function driveInfo(url) {
  for (const re of [/\/file\/d\/([a-zA-Z0-9_-]+)/, /[?&]id=([a-zA-Z0-9_-]+)/, /\/d\/([a-zA-Z0-9_-]+)/]) {
    const m = url.match(re);
    if (m) return {
      thumb: `https://drive.google.com/thumbnail?id=${m[1]}&sz=w400`,
      full:  `https://drive.google.com/file/d/${m[1]}/view`,
    };
  }
  return null;
}

function parsePhotos(raw) {
  if (!raw) return [];
  return raw.split(',').map(s => s.trim()).filter(Boolean).map(driveInfo).filter(Boolean);
}

function gvizDateToDate(v) {
  // gviz encodes dates as "Date(year,month0,day)" or datetimes as "Date(year,month0,day,h,m,s)"
  const m = String(v).match(/^Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)$/);
  if (m) return new Date(+m[1], +m[2], +m[3], +(m[4]||0), +(m[5]||0), +(m[6]||0));
  return null;
}

function formatDateTime(dateVal, timeStr) {
  let d = null;
  if (dateVal instanceof Date) d = dateVal;
  else if (typeof dateVal === 'string') d = gvizDateToDate(dateVal) || new Date(dateVal);
  if (!d || isNaN(d)) return timeStr || '';
  const ds = d.toLocaleDateString('en-CA', { year: 'numeric', month: 'short', day: 'numeric' });
  return timeStr ? `${ds} · ${timeStr}` : ds;
}

function isThisMonth(dateVal) {
  let d = null;
  if (dateVal instanceof Date) d = dateVal;
  else if (typeof dateVal === 'string') d = gvizDateToDate(dateVal) || new Date(dateVal);
  if (!d || isNaN(d)) return false;
  const n = new Date();
  return d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear();
}

function initials(name) {
  return (name || '').split(/\s+/).map(w => w[0] || '').join('').toUpperCase().slice(0, 2);
}

// ── Data fetching ──────────────────────────────────────────

async function fetchData() {
  const res = await fetch(SHEET_URL);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  // Strip JSONP wrapper: /*O_o*/\ngoogle.visualization.Query.setResponse({...});
  const json = text.replace(/^[\s\S]*?setResponse\(/, '').replace(/\);\s*$/, '');
  return JSON.parse(json);
}

function parseRows(data) {
  return (data.table.rows || []).map(row => {
    const c = row.c || [];

    const cell = (i) => {
      const x = c[i];
      if (!x || x.v == null) return '';
      return x.f != null ? x.f : x.v;
    };

    // Date columns: prefer raw value for Date() strings, formatted for display fallback
    const dateCell = (i) => {
      const x = c[i];
      if (!x || x.v == null) return '';
      if (typeof x.v === 'string' && x.v.startsWith('Date(')) {
        return gvizDateToDate(x.v) || x.f || x.v;
      }
      return x.f || x.v;
    };

    return {
      timestamp:    dateCell(0),   // auto-generated by Forms — reliable for sorting & stats
      incidentType: String(cell(1) || '').trim(),
      incidentDate: dateCell(2),
      incidentTime: String(cell(3) || '').trim(),
      location:     String(cell(4) || '').trim(),
      description:  String(cell(5) || '').trim(),
      photos:       parsePhotos(String(c[6]?.v || '')),
      videoLink:    String(cell(7) || '').trim(),
      submittedBy:  String(cell(8) || '').trim() || 'Anonymous',
    };
  }).filter(r => r.incidentType);
}

function sortDesc(incidents) {
  return [...incidents].sort((a, b) => {
    const ta = a.timestamp instanceof Date ? a.timestamp : new Date(0);
    const tb = b.timestamp instanceof Date ? b.timestamp : new Date(0);
    return tb - ta;
  });
}

// ── Rendering ──────────────────────────────────────────────

function renderCard(inc) {
  const col = typeColor(inc.incidentType);
  const dateStr = formatDateTime(inc.incidentDate, inc.incidentTime);
  const isAnon = inc.submittedBy === 'Anonymous';

  const photosHtml = inc.photos.length ? `
    <div class="card-photos">
      ${inc.photos.map(p =>
        `<img class="photo-thumb" src="${esc(p.thumb)}" data-full="${esc(p.full)}" alt="Photo" loading="lazy" onerror="this.style.display='none'">`
      ).join('')}
    </div>` : '';

  const videoHtml = inc.videoLink.startsWith('http') ? `
    <div class="card-video">
      <a href="${esc(inc.videoLink)}" target="_blank" rel="noopener noreferrer">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Watch video
      </a>
    </div>` : '';

  const avatarHtml = isAnon
    ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>`
    : initials(inc.submittedBy);

  return `
    <article class="card">
      <div class="card-header">
        <span class="type-tag" style="background:${col.bg};color:${col.text}">${esc(inc.incidentType)}</span>
        ${dateStr ? `<div class="card-date">${esc(dateStr)}</div>` : ''}
      </div>
      ${inc.location ? `
      <div class="card-location">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
        ${esc(inc.location)}
      </div>` : ''}
      ${inc.description ? `<p class="card-description">${esc(inc.description)}</p>` : ''}
      ${photosHtml}
      ${videoHtml}
      <div class="card-footer">
        <div class="avatar">${avatarHtml}</div>
        ${esc(inc.submittedBy)}
      </div>
    </article>`;
}

// ── State ──────────────────────────────────────────────────

let allIncidents = [];
let activeFilter = 'All';

function renderStats(incidents) {
  document.getElementById('stat-total').textContent = incidents.length;
  document.getElementById('stat-month').textContent = incidents.filter(i => isThisMonth(i.timestamp)).length;

  const counts = {};
  incidents.forEach(i => { counts[i.incidentType] = (counts[i.incidentType] || 0) + 1; });

  document.getElementById('type-stats').innerHTML = Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .map(([type, n]) => {
      const c = typeColor(type);
      return `<span class="type-pill">
        <span class="type-dot" style="background:${c.dot}"></span>
        ${esc(type)} <strong>${n}</strong>
      </span>`;
    }).join('');
}

function renderFilters(incidents) {
  const types = [...new Set(incidents.map(i => i.incidentType))].sort();
  if (!types.length) return;
  document.getElementById('filter-bar').style.display = '';
  const inner = document.getElementById('filter-inner');
  inner.innerHTML = ['All', ...types].map(t =>
    `<button class="filter-btn${t === activeFilter ? ' active' : ''}" data-type="${esc(t)}">${esc(t)}</button>`
  ).join('');
  inner.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.type;
      inner.querySelectorAll('.filter-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.type === activeFilter)
      );
      renderIncidents();
    });
  });
}

function renderIncidents() {
  const filtered = activeFilter === 'All'
    ? allIncidents
    : allIncidents.filter(i => i.incidentType === activeFilter);

  const label = document.getElementById('result-label');
  if (activeFilter !== 'All') {
    label.textContent = `${filtered.length} incident${filtered.length !== 1 ? 's' : ''} · ${activeFilter}`;
    label.style.display = '';
  } else {
    label.style.display = 'none';
  }

  const cards = document.getElementById('cards');
  if (!filtered.length) {
    cards.innerHTML = '<p class="no-results">No incidents match this filter.</p>';
    return;
  }
  cards.innerHTML = filtered.map(renderCard).join('');
  cards.querySelectorAll('.photo-thumb').forEach(img => {
    img.addEventListener('click', () => openLightbox(img.dataset.full || img.src));
  });
}

// ── Lightbox ───────────────────────────────────────────────

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}
document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeLightbox();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});

// ── Boot ───────────────────────────────────────────────────

async function init() {
  try {
    const data = await fetchData();
    const parsed = parseRows(data);
    allIncidents = sortDesc(parsed);

    document.getElementById('loading').style.display = 'none';

    if (!allIncidents.length) {
      document.getElementById('error').textContent = 'No incidents found in the sheet.';
      document.getElementById('error').style.display = '';
      return;
    }

    // Assign colours in alphabetical order so stats + cards + filter are consistent
    [...new Set(allIncidents.map(i => i.incidentType))].sort().forEach(typeColor);

    renderStats(allIncidents);
    renderFilters(allIncidents);
    renderIncidents();

  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error');
    el.textContent = `Could not load incidents: ${err.message}`;
    el.style.display = '';
    console.error(err);
  }
}

init();
</script>
</body>
</html>
